all:
  vars:
    locale: "en_US.UTF-8"
  children:
    homelab:
      vars:
        ansible_become: yes
        ansible_become_method: sudo
        default_interface: "example_interface"
        secret_env_dir: "/etc/homelab/secrets"
        ip_ansible: "192.168.1.1/32"
        management_network: "192.168.1.0/24"
        user_name: "example_user"
        porkbun_api_key: "example_api_key"
        porkbun_api_key_secret: "example_api_key_secret"
        top_domain: "example.com"
        container_dns:
          domain: dns.podman
          aliases:
            postgres_backend: postgres-backend
            redis_backend: redis-backend
            nextcloud_backend: nextcloud-backend
            nextcloud_proxy: nextcloud-proxy
            paperless_backend: paperless-backend
            paperless_proxy: paperless-proxy
            navidrome_proxy: navidrome-proxy
            vaultwarden_proxy: vaultwarden-proxy
            semaphore_backend: semaphore-backend
            semaphore_proxy: semaphore-proxy
            semaphore_egress: semaphore-egress
            traefik_proxy: traefik-proxy
            traefik_egress: traefik-egress
        nextcloud_dns_name: "example.nextcloud.com"
        nextcloud_rclone_user: "example_user"
        nextcloud_webdav_user: "example_user"
        nextcloud_rclone_pass: "example_pass"
        nextcloud_webdav_pass: "example_pass"
        nextcloud_webdav_path: "https://example.nextcloud.com/remote.php/dav/files/user"

      hosts:
        vm1:
          ansible_host: 192.168.1.X
          homelab_domain: "example.com"
          homelab_subdomain: "home"
          traefik_path: /path/to/traefik
          traefik_egress_network: traefik_egress_net
          traefik_dashboard_fqdn: "traefik.example.com"
          traefik_dashboard_basic_auth_users:
            - 'admin:$apr1$example$T2v8QdKqzJ8D7c4s1bYhZ/'
          traefik_acme_email: "admin@example.com"
          proxy_config:
            - name: nextcloud_proxy
              proxy_fqdn: "nextcloud.example.com"
              proxy_upstream_port: "80"
              proxy_upstream_protocol: "http"
              container_destination: "{{ container_dns.aliases.nextcloud_proxy }}.{{ container_dns.domain }}"
              proxy_network: "nextcloud_proxy_net"
              proxy_allow_encoded_slash: true
            - name: paperless_ngx_proxy
              proxy_fqdn: "paperless.example.com"
              proxy_upstream_port: "8000"
              proxy_upstream_protocol: "http"
              container_destination: "{{ container_dns.aliases.paperless_proxy }}.{{ container_dns.domain }}"
              proxy_network: "paperless_proxy_net"
            - name: navidrome_proxy
              proxy_fqdn: "navidrome.example.com"
              proxy_upstream_port: "4533"
              proxy_upstream_protocol: "http"
              container_destination: "{{ container_dns.aliases.navidrome_proxy }}.{{ container_dns.domain }}"
              proxy_network: "navidrome_container_net"
            - name: vaultwarden_proxy
              proxy_fqdn: "vault.example.com"
              proxy_upstream_port: "80"
              proxy_upstream_protocol: "http"
              container_destination: "{{ container_dns.aliases.vaultwarden_proxy }}.{{ container_dns.domain }}"
              proxy_network: "vaultwarden_container_net"
            - name: semaphore_proxy
              proxy_fqdn: "semaphore.example.com"
              proxy_upstream_port: "3000"
              proxy_upstream_protocol: "http"
              container_destination: "{{ container_dns.aliases.semaphore_proxy }}.{{ container_dns.domain }}"
              proxy_network: "semaphore_container_net"
              proxy_management_only: true

          postgres_path: /path/to/postgres
          nextcloud_path: /path/to/nextcloud
          nextcloud_disk: "UUID=example-uuid"
          nextcloud_borg_backup_path: /path/to/nextcloud/borg/backup
          nextcloud_paperless_backup_location: Nextcloud:backup/nextcloud
          nextcloud_uid: "33"
          nextcloud_gid: "33"
          postgres_admin_user: postgres_admin
          postgres_admin_password: example_admin_password
          postgres_legacy_bootstrap_user: ""
          postgres_legacy_bootstrap_password: ""
          nextcloud_database_name: nextcloud
          nextcloud_homelab_user: nextcloud_user
          nextcloud_db_user: nextcloud_user
          nextcloud_db_password: example_nextcloud_password
          nextcloud_admin_user: admin
          nextcloud_admin_password: example_password
          nextcloud_trusted_domains: nextcloud.example.com
          nextcloud_dns_name: nextcloud.example.com

          paperless_path: /path/to/paperless
          paperless_data_path: /path/to/paperless/data
          paperless_media_path: /path/to/paperless/media
          paperless_export_path: /path/to/paperless/export
          paperless_consume_path: /path/to/paperless/consume
          paperless_database_name: paperless
          paperless_db_user: paperless_user
          paperless_db_password: example_paperless_password
          paperless_dns_name: paperless.example.com

          semaphore_database_name: semaphore
          semaphore_db_user: semaphore_user
          semaphore_db_password: example_semaphore_password
          semaphore_admin_name: admin
          semaphore_admin_email: admin@example.com
          semaphore_admin_password: example_password
          semaphore_encryption_key: example_32_char_encryption_key_with_extra_length
          semaphore_known_hosts: |
            192.168.1.10 ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAexampleknownhost
          semaphore_backup_location: Nextcloud:semaphore_backup
          semaphore_egress_network: semaphore_egress_net

          navidrome_path: /path/to/navidrome
          navidrome_backup_location: Nextcloud:navidrome_backup
          navidrome_local_music_path: /path/to/nextcloud/data/<username>/files/Music
          navidrome_uid: "33"
          navidrome_gid: "33"

          vaultwarden_path: /path/to/vaultwarden
          vaultwarden_backup_location: Nextcloud:vaultwarden_backup
          vaultwarden_signups_allowed: false

          container_service_names: "postgres_container redis_container nextcloud_container paperless_ngx navidrome_container vaultwarden semaphore"
          borg_backup_path: /path/to/borg_backup
          backup_disk: "UUID=example-uuid-backup-disk"
          backup_local: true
          backup_host: "192.168.1.50/32"

        vm2:
          ansible_host: 192.168.1.121
          dev_vm_tmux_session: dev
          dev_vm_npm_prefix: /home/example_user/.npm-global
          vm2_selinux_extra_booleans:
            - name: domain_can_mmap_files
              state: true
