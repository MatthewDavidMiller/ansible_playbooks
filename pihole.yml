# Place hosts in here and roles to run
---
- name: Configure pihole
  hosts: pihole
  roles:
    - standard_ssh
    - standard_qemu_guest_agent
    - standard_update_packages
    - configure_timezone
    - standard_cron
    - standard_firewalld
    - standard_podman
    - standard_rclone
    - reverse_proxy
    - dns
    - standard_cleanup
