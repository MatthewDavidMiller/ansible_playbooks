---
# User that owns interactive Codex/Claude Code tooling.
dev_vm_user: "{{ user_name }}"

# User-local npm prefix. Avoids sudo npm global installs.
dev_vm_npm_prefix: "/home/{{ dev_vm_user }}/.npm-global"

# Named tmux session used by the devmux helper.
dev_vm_tmux_session: dev

dev_vm_packages:
  - tmux
  - git
  - nodejs
  - npm
  - python3
  - python3-pip
  - '@Development Tools'
  - jq
  - curl
  - wget
  - unzip
  - tar
  - ripgrep
  - fd-find
  - bubblewrap
  - podman
  - golang
  - rust
  - cargo
  - ansible-core

dev_vm_docker_packages:
  - docker-ce
  - docker-ce-cli
  - containerd.io
  - docker-buildx-plugin
  - docker-compose-plugin

dev_vm_npm_global_packages:
  - '@openai/codex'
  - '@anthropic-ai/claude-code'

# User-local Python CLI tools needed for validating this repository.
dev_vm_python_user_base: "/home/{{ dev_vm_user }}/.local"
dev_vm_python_user_packages:
  - ansible-lint

# Install repo-pinned collections when this checkout exists on the dev VM.
dev_vm_install_project_collections: true
dev_vm_ansible_project_path: "/home/{{ dev_vm_user }}/matt_dev/ansible_playbooks"
dev_vm_ansible_collection_requirements: "{{ dev_vm_ansible_project_path }}/collections/requirements.yml"
dev_vm_ansible_collection_path: "{{ dev_vm_ansible_project_path }}/collections"
