---
- name: Validate dev VM user input
  ansible.builtin.assert:
    that:
      - dev_vm_user | length > 0
      - dev_vm_npm_prefix is match('^/home/[^/]+/.+')
    fail_msg: "Set dev_vm_user and dev_vm_npm_prefix to a user-owned path under /home."

- name: Confirm dev VM user exists
  ansible.builtin.getent:
    database: passwd
    key: "{{ dev_vm_user }}"

- name: Install dev workstation packages
  ansible.builtin.dnf:
    name: "{{ dev_vm_packages }}"
    state: present

- name: Remove Podman Docker compatibility shim before Docker Engine install
  ansible.builtin.dnf:
    name: podman-docker
    state: absent

- name: Configure Docker CE stable repository
  ansible.builtin.yum_repository:
    name: docker-ce-stable
    description: Docker CE Stable - $basearch
    baseurl: "https://download.docker.com/linux/rhel/$releasever/$basearch/stable"
    enabled: true
    gpgcheck: true
    gpgkey: https://download.docker.com/linux/rhel/gpg

- name: Install Docker Engine packages
  ansible.builtin.dnf:
    name: "{{ dev_vm_docker_packages }}"
    state: present

- name: Enable Docker service for local container validation
  ansible.builtin.systemd:
    name: docker.service
    enabled: true
    state: started

- name: Allow dev user to run Docker validation commands
  ansible.builtin.user:
    name: "{{ dev_vm_user }}"
    groups: docker
    append: true

- name: Ensure user-local npm directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ dev_vm_user }}"
    mode: "0755"
  loop:
    - "{{ dev_vm_npm_prefix }}"
    - "{{ dev_vm_npm_prefix }}/bin"

- name: Configure npm prefix for dev user
  ansible.builtin.lineinfile:
    path: "/home/{{ dev_vm_user }}/.npmrc"
    regexp: "^prefix="
    line: "prefix={{ dev_vm_npm_prefix }}"
    create: true
    owner: "{{ dev_vm_user }}"
    mode: "0644"

- name: Install Codex and Claude Code for dev user
  community.general.npm:
    name: "{{ item }}"
    global: true
    state: present
  become: true
  become_user: "{{ dev_vm_user }}"
  environment:
    HOME: "/home/{{ dev_vm_user }}"
    NPM_CONFIG_PREFIX: "{{ dev_vm_npm_prefix }}"
    PATH: "{{ dev_vm_npm_prefix }}/bin:{{ ansible_env.PATH }}"
  loop: "{{ dev_vm_npm_global_packages }}"

- name: Ensure user-local Python directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ dev_vm_user }}"
    mode: "0755"
  loop:
    - "{{ dev_vm_python_user_base }}"
    - "{{ dev_vm_python_user_base }}/bin"

- name: Install Python CLI tools for dev user
  ansible.builtin.pip:
    name: "{{ item }}"
    extra_args: --user
    state: present
  become: true
  become_user: "{{ dev_vm_user }}"
  environment:
    HOME: "/home/{{ dev_vm_user }}"
    PATH: "{{ dev_vm_python_user_base }}/bin:{{ ansible_env.PATH }}"
  loop: "{{ dev_vm_python_user_packages }}"

- name: Expose user-local Python binaries on login shells
  ansible.builtin.copy:
    dest: /etc/profile.d/dev-vm-python.sh
    owner: root
    group: root
    mode: "0644"
    content: |
      # Managed by Ansible.
      if [ "$USER" = "{{ dev_vm_user }}" ] && [ -d "{{ dev_vm_python_user_base }}/bin" ]; then
          case ":$PATH:" in
              *":{{ dev_vm_python_user_base }}/bin:"*) ;;
              *) PATH="{{ dev_vm_python_user_base }}/bin:$PATH" ;;
          esac
      fi
      export PATH

- name: Check for repo-pinned Ansible collection requirements
  ansible.builtin.stat:
    path: "{{ dev_vm_ansible_collection_requirements }}"
  register: dev_vm_collection_requirements
  when: dev_vm_install_project_collections | bool

- name: Ensure repo Ansible collections path exists
  ansible.builtin.file:
    path: "{{ dev_vm_ansible_collection_path }}"
    state: directory
    owner: "{{ dev_vm_user }}"
    mode: "0755"
  when:
    - dev_vm_install_project_collections | bool
    - dev_vm_collection_requirements.stat.exists | default(false)

- name: Install repo-pinned Ansible collections
  ansible.builtin.command:
    argv:
      - ansible-galaxy
      - collection
      - install
      - -r
      - "{{ dev_vm_ansible_collection_requirements }}"
      - -p
      - "{{ dev_vm_ansible_collection_path }}"
  become: true
  become_user: "{{ dev_vm_user }}"
  environment:
    HOME: "/home/{{ dev_vm_user }}"
  register: dev_vm_ansible_collection_install
  changed_when: "'Nothing to do' not in dev_vm_ansible_collection_install.stdout"
  when:
    - dev_vm_install_project_collections | bool
    - dev_vm_collection_requirements.stat.exists | default(false)

- name: Expose user-local npm binaries on login shells
  ansible.builtin.copy:
    dest: /etc/profile.d/dev-vm-npm.sh
    owner: root
    group: root
    mode: "0644"
    content: |
      # Managed by Ansible.
      if [ "$USER" = "{{ dev_vm_user }}" ] && [ -d "{{ dev_vm_npm_prefix }}/bin" ]; then
          case ":$PATH:" in
              *":{{ dev_vm_npm_prefix }}/bin:"*) ;;
              *) PATH="{{ dev_vm_npm_prefix }}/bin:$PATH" ;;
          esac
      fi
      export PATH

- name: Install tmux helper for long-running agent sessions
  ansible.builtin.copy:
    dest: /etc/profile.d/dev-vm-tmux.sh
    owner: root
    group: root
    mode: "0644"
    content: |
      # Managed by Ansible.
      devmux() {
          tmux new-session -A -s "${DEVMUX_SESSION:-{{ dev_vm_tmux_session }}}" "$@"
      }

      if [ "$USER" = "{{ dev_vm_user }}" ] && [ -n "$SSH_CONNECTION" ]; then
          case "$-" in
              *i*)
                  cat <<'EOF'

      Dev VM session helper:
        Run "devmux" to attach to or create the persistent tmux session.
        Detach from tmux with Ctrl-b, then d.
        Set DEVMUX_SESSION=name before running devmux to use a different session.

      EOF
                  ;;
          esac
      fi
