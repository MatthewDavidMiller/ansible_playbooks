---
# navidrome role defaults

# Path to the Navidrome container data directory
navidrome_path: ""

# Optional: local path to the music library (bind-mounted read-only into the container).
# Defaults to navidrome_path + '/music' when not set.
navidrome_local_music_path: ""

# Rclone remote path for navidrome backup uploads (e.g. "Nextcloud:navidrome_backup")
navidrome_backup_location: ""

# When true, backups are written directly to the local Nextcloud data directory
# instead of being uploaded via rclone.  Set to false for hosts without local Nextcloud.
backup_local: false

# Path to Nextcloud data root (required when backup_local is true)
nextcloud_path: ""

# Nextcloud username whose files directory is used as the backup destination
nextcloud_homelab_user: ""

# UID/GID used by Nextcloud to own files on the host-mounted data path
nextcloud_uid: "33"
nextcloud_gid: "33"

# WebDAV URL for the Nextcloud rclone remote (used by davfs2_secrets template)
nextcloud_webdav_path: ""

# WebDAV username for the Nextcloud rclone remote
nextcloud_webdav_user: ""

# WebDAV password for the Nextcloud rclone remote
nextcloud_webdav_pass: ""

# OS user that owns the backup shell script
user_name: ""

# Explicit container UID/GID to avoid inheriting root from the systemd context.
# Navidrome-managed directories under navidrome_path are created with this ownership.
# The role sets explicit directory modes: 0750 for navidrome_path/music and 0700 for data/backup.
navidrome_uid: "33"
navidrome_gid: "33"

# Container image pinned in inventory
navidrome_image: docker.io/deluan/navidrome:0.54.5
