---
- name: Inspect navidrome container network
  ansible.builtin.command:
    argv:
      - podman
      - network
      - inspect
      - navidrome_container_net
  register: navidrome_network
  changed_when: false
  failed_when: false

- name: Create navidrome container network
  ansible.builtin.command:
    argv:
      - podman
      - network
      - create
      - --subnet
      - 172.16.1.24/29
      - navidrome_container_net
  when: navidrome_network.rc != 0

- name: Create Navidrome managed paths
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ navidrome_uid }}"
    group: "{{ navidrome_gid }}"
    mode: "{{ item.mode }}"
  loop:
    - path: "{{ navidrome_path }}"
      mode: "0750"
    - path: "{{ navidrome_path }}/music"
      mode: "0750"
    - path: "{{ navidrome_path }}/data"
      mode: "0700"
    - path: "{{ navidrome_path }}/backup"
      mode: "0700"

- name: Align Navidrome writable path ownership
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ navidrome_uid }}"
    group: "{{ navidrome_gid }}"
    recurse: true
  loop:
    - "{{ navidrome_path }}/data"
    - "{{ navidrome_path }}/backup"

- name: Navidrome Service
  ansible.builtin.template:
    src: navidrome_container.service.j2
    dest: /etc/systemd/system/navidrome_container.service

- name: Enable Navidrome
  ansible.builtin.systemd:
    name: navidrome_container.service
    daemon_reload: true
    enabled: true

- name: Navidrome script
  ansible.builtin.template:
    src: navidrome_container.sh.j2
    dest: /usr/local/bin/navidrome_container.sh
    owner: root
    group: root
    mode: "0700"

- name: Install zip and jq packages
  ansible.builtin.dnf:
    name:
      - zip
      - jq
    state: present

- name: Backup navidrome script
  ansible.builtin.template:
    src: backup_navidrome.sh.j2
    dest: /usr/local/bin/backup_navidrome.sh
    owner: "{{ user_name }}"
    group: root
    mode: "0700"

- name: Backup navidrome daily
  ansible.builtin.cron:
    name: Backup navidrome daily
    special_time: daily
    job: /usr/bin/bash /usr/local/bin/backup_navidrome.sh

- name: Start Navidrome
  ansible.builtin.systemd:
    name: navidrome_container.service
    state: started
