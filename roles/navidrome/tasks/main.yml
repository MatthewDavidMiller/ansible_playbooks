---
- name: Inspect navidrome container network
  ansible.builtin.command:
    argv:
      - podman
      - network
      - inspect
      - navidrome_container_net
  register: navidrome_network
  changed_when: false
  failed_when: false

- name: Create navidrome container network
  ansible.builtin.command:
    argv:
      - podman
      - network
      - create
      - --internal
      - --subnet
      - "{{ route_proxy_network_subnets.navidrome_container_net }}"
      - navidrome_container_net
  when: navidrome_network.rc != 0

- name: Queue legacy navidrome proxy network for deferred replacement
  ansible.builtin.set_fact:
    container_network_migrations: "{{ container_network_migrations | default([]) + [network_migration] }}"
  vars:
    network_migration:
      name: navidrome_container_net
      subnet: "{{ route_proxy_network_subnets.navidrome_container_net }}"
  when: navidrome_network.rc == 0
    and apply_runtime_changes_on_reboot | default(false) | bool
    and (
      not ((navidrome_network.stdout | from_json | first).internal | default((navidrome_network.stdout | from_json | first).Internal | default(false)) | bool)
      or route_proxy_network_subnets.navidrome_container_net not in ((navidrome_network.stdout | from_json | first).subnets | default([]) | map(attribute='subnet') | list)
    )

- name: Remove non-internal navidrome proxy network
  ansible.builtin.command:
    argv:
      - podman
      - network
      - rm
      - --force
      - --time
      - "30"
      - navidrome_container_net
  when: navidrome_network.rc == 0
    and not (apply_runtime_changes_on_reboot | default(false) | bool)
    and (
      not ((navidrome_network.stdout | from_json | first).internal | default((navidrome_network.stdout | from_json | first).Internal | default(false)) | bool)
      or route_proxy_network_subnets.navidrome_container_net not in ((navidrome_network.stdout | from_json | first).subnets | default([]) | map(attribute='subnet') | list)
    )

- name: Recreate navidrome proxy network as internal
  ansible.builtin.command:
    argv:
      - podman
      - network
      - create
      - --internal
      - --subnet
      - "{{ route_proxy_network_subnets.navidrome_container_net }}"
      - navidrome_container_net
  when: navidrome_network.rc == 0
    and not (apply_runtime_changes_on_reboot | default(false) | bool)
    and (
      not ((navidrome_network.stdout | from_json | first).internal | default((navidrome_network.stdout | from_json | first).Internal | default(false)) | bool)
      or route_proxy_network_subnets.navidrome_container_net not in ((navidrome_network.stdout | from_json | first).subnets | default([]) | map(attribute='subnet') | list)
    )

- name: Create Navidrome managed paths
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ navidrome_uid }}"
    group: "{{ navidrome_gid }}"
    mode: "{{ item.mode }}"
  loop:
    - path: "{{ navidrome_path }}"
      mode: "0750"
    - path: "{{ navidrome_path }}/music"
      mode: "0750"
    - path: "{{ navidrome_path }}/data"
      mode: "0700"
    - path: "{{ navidrome_path }}/backup"
      mode: "0700"

- name: Align Navidrome writable path ownership
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ navidrome_uid }}"
    group: "{{ navidrome_gid }}"
    recurse: true
  loop:
    - "{{ navidrome_path }}/data"
    - "{{ navidrome_path }}/backup"

- name: Navidrome Service
  ansible.builtin.template:
    src: navidrome_container.service.j2
    dest: /etc/systemd/system/navidrome_container.service

- name: Enable Navidrome
  ansible.builtin.systemd:
    name: navidrome_container.service
    daemon_reload: true
    enabled: true

- name: Navidrome script
  ansible.builtin.template:
    src: navidrome_container.sh.j2
    dest: /usr/local/bin/navidrome_container.sh
    owner: root
    group: root
    mode: "0700"

- name: Install zip and jq packages
  ansible.builtin.dnf:
    name:
      - zip
      - jq
    state: present

- name: Create Navidrome Nextcloud backup destination
  ansible.builtin.file:
    path: "{{ nextcloud_path }}/data/{{ nextcloud_homelab_user }}/files/{{ navidrome_backup_location | replace('Nextcloud:', '') }}"
    state: directory
    owner: "{{ nextcloud_uid }}"
    group: "{{ nextcloud_gid }}"
    mode: "0770"
  when: backup_local | default(false)

- name: Repair Navidrome Nextcloud backup destination ownership
  ansible.builtin.file:
    path: "{{ nextcloud_path }}/data/{{ nextcloud_homelab_user }}/files/{{ navidrome_backup_location | replace('Nextcloud:', '') }}"
    state: directory
    owner: "{{ nextcloud_uid }}"
    group: "{{ nextcloud_gid }}"
    recurse: true
  when: backup_local | default(false)

- name: Backup navidrome script
  ansible.builtin.template:
    src: backup_navidrome.sh.j2
    dest: /usr/local/bin/backup_navidrome.sh
    owner: root
    group: root
    mode: "0700"

- name: Backup navidrome daily
  ansible.builtin.cron:
    name: Backup navidrome daily
    special_time: daily
    job: /usr/bin/bash /usr/local/bin/backup_navidrome.sh

- name: Start Navidrome
  ansible.builtin.systemd:
    name: navidrome_container.service
    state: started
  when: not (apply_runtime_changes_on_reboot | default(false) | bool)
