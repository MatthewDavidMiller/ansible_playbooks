---
# https://docs.linuxserver.io/general/swag

- name: Inspect nextcloud container network
  ansible.builtin.command:
    argv:
      - podman
      - network
      - inspect
      - nextcloud_container_net
  register: nextcloud_network
  changed_when: false
  failed_when: false

- name: Create nextcloud and postgres container network
  ansible.builtin.command:
    argv:
      - podman
      - network
      - create
      - --internal
      - --subnet
      - "{{ nextcloud_backend_network_subnet }}"
      - nextcloud_container_net
  when: nextcloud_network.rc != 0

- name: Queue legacy nextcloud backend network for deferred replacement
  ansible.builtin.set_fact:
    container_network_migrations: "{{ container_network_migrations | default([]) + [network_migration] }}"
  vars:
    network_migration:
      name: nextcloud_container_net
      subnet: "{{ nextcloud_backend_network_subnet }}"
  when: nextcloud_network.rc == 0
    and apply_runtime_changes_on_reboot | default(false) | bool
    and (
      not ((nextcloud_network.stdout | from_json | first).internal | default((nextcloud_network.stdout | from_json | first).Internal | default(false)) | bool)
      or nextcloud_backend_network_subnet not in ((nextcloud_network.stdout | from_json | first).subnets | default([]) | map(attribute='subnet') | list)
    )

- name: Remove non-internal nextcloud backend network
  ansible.builtin.command:
    argv:
      - podman
      - network
      - rm
      - --force
      - --time
      - "30"
      - nextcloud_container_net
  when: nextcloud_network.rc == 0
    and not (apply_runtime_changes_on_reboot | default(false) | bool)
    and (
      not ((nextcloud_network.stdout | from_json | first).internal | default((nextcloud_network.stdout | from_json | first).Internal | default(false)) | bool)
      or nextcloud_backend_network_subnet not in ((nextcloud_network.stdout | from_json | first).subnets | default([]) | map(attribute='subnet') | list)
    )

- name: Recreate nextcloud backend network as internal
  ansible.builtin.command:
    argv:
      - podman
      - network
      - create
      - --internal
      - --subnet
      - "{{ nextcloud_backend_network_subnet }}"
      - nextcloud_container_net
  when: nextcloud_network.rc == 0
    and not (apply_runtime_changes_on_reboot | default(false) | bool)
    and (
      not ((nextcloud_network.stdout | from_json | first).internal | default((nextcloud_network.stdout | from_json | first).Internal | default(false)) | bool)
      or nextcloud_backend_network_subnet not in ((nextcloud_network.stdout | from_json | first).subnets | default([]) | map(attribute='subnet') | list)
    )

- name: Inspect nextcloud proxy network
  ansible.builtin.command:
    argv:
      - podman
      - network
      - inspect
      - nextcloud_proxy_net
  register: nextcloud_proxy_network
  changed_when: false
  failed_when: false

- name: Create nextcloud proxy network
  ansible.builtin.command:
    argv:
      - podman
      - network
      - create
      - --internal
      - --subnet
      - "{{ route_proxy_network_subnets.nextcloud_proxy_net }}"
      - nextcloud_proxy_net
  when: nextcloud_proxy_network.rc != 0

- name: Queue legacy nextcloud proxy network for deferred replacement
  ansible.builtin.set_fact:
    container_network_migrations: "{{ container_network_migrations | default([]) + [network_migration] }}"
  vars:
    network_migration:
      name: nextcloud_proxy_net
      subnet: "{{ route_proxy_network_subnets.nextcloud_proxy_net }}"
  when: nextcloud_proxy_network.rc == 0
    and apply_runtime_changes_on_reboot | default(false) | bool
    and (
      not ((nextcloud_proxy_network.stdout | from_json | first).internal | default((nextcloud_proxy_network.stdout | from_json | first).Internal | default(false)) | bool)
      or route_proxy_network_subnets.nextcloud_proxy_net not in ((nextcloud_proxy_network.stdout | from_json | first).subnets | default([]) | map(attribute='subnet') | list)
    )

- name: Remove non-internal nextcloud proxy network
  ansible.builtin.command:
    argv:
      - podman
      - network
      - rm
      - --force
      - --time
      - "30"
      - nextcloud_proxy_net
  when: nextcloud_proxy_network.rc == 0
    and not (apply_runtime_changes_on_reboot | default(false) | bool)
    and (
      not ((nextcloud_proxy_network.stdout | from_json | first).internal | default((nextcloud_proxy_network.stdout | from_json | first).Internal | default(false)) | bool)
      or route_proxy_network_subnets.nextcloud_proxy_net not in ((nextcloud_proxy_network.stdout | from_json | first).subnets | default([]) | map(attribute='subnet') | list)
    )

- name: Recreate nextcloud proxy network as internal
  ansible.builtin.command:
    argv:
      - podman
      - network
      - create
      - --internal
      - --subnet
      - "{{ route_proxy_network_subnets.nextcloud_proxy_net }}"
      - nextcloud_proxy_net
  when: nextcloud_proxy_network.rc == 0
    and not (apply_runtime_changes_on_reboot | default(false) | bool)
    and (
      not ((nextcloud_proxy_network.stdout | from_json | first).internal | default((nextcloud_proxy_network.stdout | from_json | first).Internal | default(false)) | bool)
      or route_proxy_network_subnets.nextcloud_proxy_net not in ((nextcloud_proxy_network.stdout | from_json | first).subnets | default([]) | map(attribute='subnet') | list)
    )

- name: Create nextcloud secret directory
  ansible.builtin.file:
    path: "{{ secret_env_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0700"

- name: PostgreSQL env file
  ansible.builtin.template:
    src: postgres.env.j2
    dest: "{{ secret_env_dir }}/postgres.env"
    owner: root
    group: root
    mode: "0600"
  no_log: true

- name: Nextcloud env file
  ansible.builtin.template:
    src: nextcloud.env.j2
    dest: "{{ secret_env_dir }}/nextcloud.env"
    owner: root
    group: root
    mode: "0600"
  no_log: true

- name: Redis env file
  ansible.builtin.copy:
    dest: "{{ secret_env_dir }}/redis.env"
    content: |
      TZ={{ 'America/New_York' | quote }}
    owner: root
    group: root
    mode: "0600"
  no_log: true

- name: Create postgres database container path
  ansible.builtin.file:
    path: "{{ postgres_path }}"
    state: directory
    owner: "999"
    group: "999"
    mode: "0750"

- name: Create postgres database custom-init path
  ansible.builtin.file:
    path: "{{ postgres_path }}/custom-init"
    state: directory
    owner: "999"
    group: "999"
    mode: "0750"

- name: Create postgres data directory
  ansible.builtin.file:
    path: "{{ postgres_path }}/pgdata"
    state: directory
    owner: "999"
    group: "999"
    mode: "0750"

- name: Create Nextcloud container path
  ansible.builtin.file:
    path: "{{ nextcloud_path }}"
    state: directory
    owner: "{{ nextcloud_uid }}"
    group: "{{ nextcloud_gid }}"
    mode: "0770"

- name: Mount Disk for backups
  ansible.posix.mount:
    path: "{{ nextcloud_path }}"
    src: "{{ nextcloud_disk }}"
    fstype: ext4
    opts: rw,auto
    state: mounted

- name: Create Nextcloud base container path
  ansible.builtin.file:
    path: "{{ nextcloud_path }}/base"
    state: directory
    owner: "{{ nextcloud_uid }}"
    group: "{{ nextcloud_gid }}"
    mode: "0770"

- name: Create Nextcloud data container path
  ansible.builtin.file:
    path: "{{ nextcloud_path }}/data"
    state: directory
    owner: "{{ nextcloud_uid }}"
    group: "{{ nextcloud_gid }}"
    mode: "0770"

- name: Find Nextcloud user files roots
  ansible.builtin.command:
    argv:
      - find
      - "{{ nextcloud_path }}/data"
      - -mindepth
      - "2"
      - -maxdepth
      - "2"
      - -type
      - d
      - -name
      - files
      - -print
  register: nextcloud_user_files_roots
  changed_when: false
  when: nextcloud_normalize_user_files_permissions | bool

- name: Normalize Nextcloud user directory permissions
  ansible.builtin.command:
    argv:
      - find
      - "{{ item }}"
      - -type
      - d
      - -not
      - -perm
      - "{{ nextcloud_user_files_directory_mode }}"
      - -print
      - -exec
      - chmod
      - "{{ nextcloud_user_files_directory_mode }}"
      - "{}"
      - +
  register: nextcloud_user_directory_permissions
  loop: "{{ nextcloud_user_files_roots.stdout_lines }}"
  changed_when: nextcloud_user_directory_permissions.stdout != ""
  when:
    - nextcloud_normalize_user_files_permissions | bool
    - nextcloud_user_files_roots.stdout_lines | length > 0

- name: Normalize Nextcloud user file permissions
  ansible.builtin.command:
    argv:
      - find
      - "{{ item }}"
      - -type
      - f
      - -not
      - -perm
      - "{{ nextcloud_user_files_file_mode }}"
      - -print
      - -exec
      - chmod
      - "{{ nextcloud_user_files_file_mode }}"
      - "{}"
      - +
  register: nextcloud_user_file_permissions
  loop: "{{ nextcloud_user_files_roots.stdout_lines }}"
  changed_when: nextcloud_user_file_permissions.stdout != ""
  when:
    - nextcloud_normalize_user_files_permissions | bool
    - nextcloud_user_files_roots.stdout_lines | length > 0

- name: Create Nextcloud config container path
  ansible.builtin.file:
    path: "{{ nextcloud_path }}/config"
    state: directory
    owner: "{{ nextcloud_uid }}"
    group: "{{ nextcloud_gid }}"
    mode: "0770"

- name: Create Nextcloud apps container path
  ansible.builtin.file:
    path: "{{ nextcloud_path }}/apps"
    state: directory
    owner: "{{ nextcloud_uid }}"
    group: "{{ nextcloud_gid }}"
    mode: "0770"

- name: Redis Service
  ansible.builtin.template:
    src: redis_container.service.j2
    dest: /etc/systemd/system/redis_container.service

- name: Enable Redis
  ansible.builtin.systemd:
    name: redis_container.service
    enabled: true
    daemon_reload: true

- name: Postgres Service
  ansible.builtin.template:
    src: postgres_container.service.j2
    dest: /etc/systemd/system/postgres_container.service

- name: Enable postgres
  ansible.builtin.systemd:
    name: postgres_container.service
    enabled: true
    daemon_reload: true

- name: Nextcloud Service
  ansible.builtin.template:
    src: nextcloud_container.service.j2
    dest: /etc/systemd/system/nextcloud_container.service

- name: Nextcloud config reconciliation service
  ansible.builtin.template:
    src: nextcloud_configure.service.j2
    dest: /etc/systemd/system/nextcloud_configure.service

- name: Enable Nextcloud
  ansible.builtin.systemd:
    name: nextcloud_container.service
    enabled: true
    daemon_reload: true

- name: Enable Nextcloud config reconciliation
  ansible.builtin.systemd:
    name: nextcloud_configure.service
    enabled: true
    daemon_reload: true

- name: Redis script
  ansible.builtin.template:
    src: redis_container.sh.j2
    dest: /usr/local/bin/redis_container.sh
    owner: root
    group: root
    mode: "0700"

- name: Nextcloud script
  ansible.builtin.template:
    src: nextcloud_container.sh.j2
    dest: /usr/local/bin/nextcloud_container.sh
    owner: root
    group: root
    mode: "0700"

- name: Nextcloud config reconciliation script
  ansible.builtin.template:
    src: nextcloud_configure.sh.j2
    dest: /usr/local/bin/nextcloud_configure.sh
    owner: root
    group: root
    mode: "0700"

- name: Postgres script
  ansible.builtin.template:
    src: postgres_container.sh.j2
    dest: /usr/local/bin/postgres_container.sh
    owner: root
    group: root
    mode: "0700"

- name: Postgres db_wrapper script
  ansible.builtin.copy:
    src: db_wrapper.sh
    dest: "{{ postgres_path }}/custom-init/db_wrapper.sh"
    owner: "999"
    group: "999"
    mode: "0700"

- name: Backup Nextcloud and Paperless NGX script
  ansible.builtin.template:
    src: backup_nextcloud_paperless.sh.j2
    dest: /usr/local/bin/backup_nextcloud_paperless.sh
    owner: root
    group: root
    mode: "0700"

- name: Backup Nextcloud and Paperless NGX daily
  ansible.builtin.cron:
    name: Backup Nextcloud and Paperless NGX daily
    special_time: daily
    job: /usr/bin/bash /usr/local/bin/backup_nextcloud_paperless.sh

- name: Install borg backup
  ansible.builtin.dnf:
    name: borgbackup
    state: present

- name: Start Redis
  ansible.builtin.systemd:
    name: redis_container.service
    state: started
  when: not (apply_runtime_changes_on_reboot | default(false) | bool)

- name: Start postgres
  ansible.builtin.systemd:
    name: postgres_container.service
    state: started
  when: not (apply_runtime_changes_on_reboot | default(false) | bool)

- name: Start Nextcloud
  ansible.builtin.systemd:
    name: nextcloud_container.service
    state: started
  when: not (apply_runtime_changes_on_reboot | default(false) | bool)

- name: Reconcile persistent Nextcloud config
  ansible.builtin.systemd:
    name: nextcloud_configure.service
    state: started
  when: not (apply_runtime_changes_on_reboot | default(false) | bool)
