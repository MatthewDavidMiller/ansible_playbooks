---
# paperless_ngx role defaults

# Base directory for all Paperless NGX container paths
paperless_path: ""

# Path for Paperless NGX application data
paperless_data_path: ""

# Path for Paperless NGX media files
paperless_media_path: ""

# Path for Paperless NGX document exports
paperless_export_path: ""

# Path for Paperless NGX document consumption (inbox)
paperless_consume_path: ""

# PostgreSQL database name for Paperless NGX
paperless_database_name: ""

# Paperless NGX database username
paperless_db_user: ""

# Password for the Paperless NGX database user
paperless_db_password: ""

# Fully-qualified domain name for Paperless NGX (used in PAPERLESS_URL)
paperless_dns_name: ""

# OS user that owns the shell scripts
user_name: ""

# Root-only directory for runtime environment files
secret_env_dir: /etc/homelab/secrets

# Podman DNS aliases used on VM1 networks.
container_dns:
  domain: dns.podman
  aliases:
    postgres_backend: postgres-backend
    redis_backend: redis-backend
    paperless_backend: paperless-backend
    paperless_proxy: paperless-proxy

# Deterministic VM1 route proxy network subnet.
route_proxy_network_subnets:
  paperless_proxy_net: 172.16.1.40/29

# Static container IPs used with /etc/hosts overrides for latency-sensitive
# service-to-service paths.
container_static_ips:
  postgres_backend: 172.16.1.2
  redis_backend: 172.16.1.3
  paperless_backend: 172.16.1.5
  paperless_proxy: 172.16.1.42

# Container image resolved from the approved artifact lock in vm1.yml
paperless_image: ""
