---
# reverse_proxy role defaults
# This role deploys Traefik v3 on VM1.  All variables below are required.

# Path to the Traefik container configuration directory
traefik_path: ""

# Non-internal Podman network Traefik uses for ACME DNS-01 and outbound proxy needs.
traefik_egress_network: traefik_egress_net

# Optional deterministic subnets for internal route proxy networks.
route_proxy_network_subnets:
  nextcloud_proxy_net: 172.16.1.32/29
  paperless_proxy_net: 172.16.1.40/29
  navidrome_container_net: 172.16.1.24/29
  vaultwarden_container_net: 172.16.1.16/29

# Route networks that can carry the Ansible control-plane container.
# The reverse_proxy role may create these when absent, but destructive
# replacement is deferred to the owning service role later in the play.
reverse_proxy_deferred_route_networks:
  - semaphore_container_net

# Fully-qualified domain name for the Traefik dashboard
traefik_dashboard_fqdn: ""

# htpasswd-style BasicAuth users for the Traefik dashboard.
# Each entry must be formatted as "user:hashed-password".
traefik_dashboard_basic_auth_users: []

# Email address registered with the ACME provider (Porkbun) for certificate issuance
traefik_acme_email: ""

# Porkbun API key used for DNS-01 ACME challenge
porkbun_api_key: ""

# Porkbun secret API key used for DNS-01 ACME challenge
porkbun_api_key_secret: ""

# Root-only directory for runtime environment files
secret_env_dir: /etc/homelab/secrets

# Traefik image reference resolved from the approved artifact lock in vm1.yml
traefik_image: ""

# Podman DNS aliases used on VM1 networks.
container_dns:
  domain: dns.podman
  aliases:
    nextcloud_proxy: nextcloud-proxy
    paperless_proxy: paperless-proxy
    navidrome_proxy: navidrome-proxy
    vaultwarden_proxy: vaultwarden-proxy
    semaphore_proxy: semaphore-proxy
    traefik_proxy: traefik-proxy
    traefik_egress: traefik-egress

# Management network CIDR allowed to reach the Traefik dashboard (used in ip-allowlist middleware)
management_network: ""

# Ansible controller IP/CIDR also allowed to reach the Traefik dashboard
ip_ansible: ""

# List of proxy config objects; each entry generates one Traefik dynamic config file.
# Required keys per entry: name, proxy_fqdn, proxy_upstream_protocol,
#                          container_destination, proxy_upstream_port, proxy_network
proxy_config: []
