---
- name: Validate reverse proxy management controls
  ansible.builtin.assert:
    that:
      - management_network is match('^([0-9]{1,3}\\.){3}[0-9]{1,3}/[0-9]{1,2}$')
      - ip_ansible is match('^([0-9]{1,3}\\.){3}[0-9]{1,3}/[0-9]{1,2}$')
      - traefik_dashboard_basic_auth_users | length > 0
      - traefik_dashboard_basic_auth_users | difference(['']) | length == traefik_dashboard_basic_auth_users | length
      - management_network != '0.0.0.0/0'
      - ip_ansible != '0.0.0.0/0'
    fail_msg: "Set management_network, ip_ansible, and traefik_dashboard_basic_auth_users before exposing Traefik."

- name: Validate Traefik dashboard BasicAuth user format
  ansible.builtin.assert:
    that:
      - item is match('^[^:]+:.+')
    fail_msg: "Each traefik_dashboard_basic_auth_users entry must be formatted as user:hashed-password."
  loop: "{{ traefik_dashboard_basic_auth_users }}"

- name: Validate reverse proxy route definitions
  ansible.builtin.assert:
    that:
      - config_name.name is match('^[A-Za-z0-9_-]+$')
      - config_name.proxy_fqdn | length > 0
      - config_name.proxy_upstream_protocol in ['http', 'https']
      - config_name.proxy_upstream_port is match('^[0-9]{1,5}$')
      - (config_name.proxy_upstream_port | int) > 0
      - (config_name.proxy_upstream_port | int) <= 65535
      - config_name.container_destination | length > 0
      - config_name.proxy_network is defined
      - config_name.proxy_network is match('^[A-Za-z0-9_.-]+$')
      - config_name.proxy_network not in reverse_proxy_forbidden_networks
    fail_msg: "Each proxy_config entry needs a safe name, FQDN, http/https upstream, valid port, and container destination."
  loop: "{{ proxy_config }}"
  loop_control:
    loop_var: config_name
  vars:
    reverse_proxy_forbidden_networks:
      - nextcloud_container_net

- name: Validate reverse proxy route names are unique
  ansible.builtin.assert:
    that:
      - proxy_config | map(attribute='name') | list | unique | length == proxy_config | length
      - proxy_config | map(attribute='proxy_fqdn') | list | unique | length == proxy_config | length
      - traefik_dashboard_fqdn not in (proxy_config | map(attribute='proxy_fqdn') | list)
    fail_msg: "proxy_config route names and FQDNs must be unique."

- name: Build Traefik app network list
  ansible.builtin.set_fact:
    traefik_app_networks: "{{ proxy_config | map(attribute='proxy_network') | list | unique }}"

- name: Validate Traefik egress network
  ansible.builtin.assert:
    that:
      - traefik_egress_network is match('^[A-Za-z0-9_.-]+$')
      - traefik_egress_network not in traefik_app_networks
      - traefik_egress_network != 'nextcloud_container_net'
    fail_msg: "traefik_egress_network must be a safe dedicated non-backend network name."

- name: Inspect Traefik egress network
  ansible.builtin.command:
    argv:
      - podman
      - network
      - inspect
      - "{{ traefik_egress_network }}"
  register: traefik_egress_network_inspect
  changed_when: false
  failed_when: false

- name: Create Traefik egress network
  ansible.builtin.command:
    argv:
      - podman
      - network
      - create
      - "{{ traefik_egress_network }}"
  when: traefik_egress_network_inspect.rc != 0

- name: Inspect route proxy networks
  ansible.builtin.command:
    argv:
      - podman
      - network
      - inspect
      - "{{ route_proxy_network_name }}"
  register: route_proxy_networks
  changed_when: false
  failed_when: false
  loop: "{{ traefik_app_networks }}"
  loop_control:
    loop_var: route_proxy_network_name

- name: Remove non-internal route proxy networks
  ansible.builtin.command:
    argv:
      - podman
      - network
      - rm
      - --force
      - --time
      - "30"
      - "{{ route_network.route_proxy_network_name }}"
  loop: "{{ route_proxy_networks.results }}"
  loop_control:
    loop_var: route_network
  when:
    - route_network.rc == 0
    - not ((route_network.stdout | from_json | first).internal | default((route_network.stdout | from_json | first).Internal | default(false)) | bool)

- name: Create internal route proxy networks with deterministic subnets
  ansible.builtin.command:
    argv:
      - podman
      - network
      - create
      - --internal
      - --subnet
      - "{{ route_proxy_network_subnets[route_network.route_proxy_network_name] }}"
      - "{{ route_network.route_proxy_network_name }}"
  loop: "{{ route_proxy_networks.results }}"
  loop_control:
    loop_var: route_network
  when:
    - route_network.rc != 0 or not ((route_network.stdout | from_json | first).internal | default((route_network.stdout | from_json | first).Internal | default(false)) | bool)
    - route_network.route_proxy_network_name in route_proxy_network_subnets

- name: Create internal route proxy networks
  ansible.builtin.command:
    argv:
      - podman
      - network
      - create
      - --internal
      - "{{ route_network.route_proxy_network_name }}"
  loop: "{{ route_proxy_networks.results }}"
  loop_control:
    loop_var: route_network
  when:
    - route_network.rc != 0 or not ((route_network.stdout | from_json | first).internal | default((route_network.stdout | from_json | first).Internal | default(false)) | bool)
    - route_network.route_proxy_network_name not in route_proxy_network_subnets

- name: Create traefik container path
  ansible.builtin.file:
    path: "{{ traefik_path }}"
    state: directory
    owner: root
    group: root
    mode: "0750"

- name: Create traefik config path
  ansible.builtin.file:
    path: "{{ traefik_path }}/config"
    state: directory
    owner: root
    group: root
    mode: "0750"

- name: Create reverse proxy secret directory
  ansible.builtin.file:
    path: "{{ secret_env_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0700"

- name: Traefik env file
  ansible.builtin.template:
    src: traefik.env.j2
    dest: "{{ secret_env_dir }}/traefik.env"
    owner: root
    group: root
    mode: "0600"
  no_log: true

- name: Initialize acme.json
  ansible.builtin.copy:
    content: ""
    dest: "{{ traefik_path }}/acme.json"
    owner: root
    group: root
    mode: "0600"
    force: false

- name: Traefik static config
  ansible.builtin.template:
    src: traefik.yml.j2
    dest: "{{ traefik_path }}/traefik.yml"
    owner: root
    group: root
    mode: "0640"

- name: Traefik TLS options
  ansible.builtin.template:
    src: tls.yml.j2
    dest: "{{ traefik_path }}/config/tls.yml"
    owner: root
    group: root
    mode: "0640"

- name: Traefik security middlewares
  ansible.builtin.template:
    src: security.yml.j2
    dest: "{{ traefik_path }}/config/security.yml"
    owner: root
    group: root
    mode: "0640"

- name: Traefik dashboard router
  ansible.builtin.template:
    src: dashboard.yml.j2
    dest: "{{ traefik_path }}/config/dashboard.yml"
    owner: root
    group: root
    mode: "0640"

- name: Traefik service proxy configs
  ansible.builtin.template:
    src: service_proxy.yml.j2
    dest: "{{ traefik_path }}/config/{{ config_name.name }}.yml"
    owner: root
    group: root
    mode: "0640"
  loop: "{{ proxy_config }}"
  loop_control:
    loop_var: config_name

- name: Traefik service unit
  ansible.builtin.template:
    src: traefik_container.service.j2
    dest: /etc/systemd/system/traefik_container.service

- name: Enable Traefik
  ansible.builtin.systemd:
    name: traefik_container.service
    enabled: true
    daemon_reload: true

- name: Traefik launch script
  ansible.builtin.template:
    src: traefik_container.sh.j2
    dest: /usr/local/bin/traefik_container.sh
    owner: root
    group: root
    mode: "0700"

- name: Start Traefik
  ansible.builtin.systemd:
    name: traefik_container.service
    state: started
  when: not (apply_runtime_changes_on_reboot | default(false) | bool)
