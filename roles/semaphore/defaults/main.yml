---
# semaphore role defaults

# PostgreSQL database name for Semaphore
semaphore_database_name: ""

# Semaphore database username
semaphore_db_user: ""

# Password for the Semaphore database user
semaphore_db_password: ""

# Semaphore admin account username
semaphore_admin_name: ""

# Semaphore admin account email address
semaphore_admin_email: ""

# Semaphore admin account password
semaphore_admin_password: ""

# Encryption key used by Semaphore for access key storage; must be at least 32 characters
semaphore_encryption_key: ""

# Rclone remote path for Semaphore DB backup uploads (e.g. "Nextcloud:semaphore_backup")
semaphore_backup_location: ""

# When true, backups are written directly to the local Nextcloud data directory
# instead of being uploaded via rclone.
backup_local: false

# Path to Nextcloud data root (required when backup_local is true)
nextcloud_path: ""

# Nextcloud username whose files directory is used as the backup destination
nextcloud_homelab_user: ""

# UID/GID used by Nextcloud to own files on the host-mounted data path
nextcloud_uid: "33"
nextcloud_gid: "33"

# OS user that owns the Semaphore shell script
user_name: ""

# Root-only directory for runtime environment files
secret_env_dir: /etc/homelab/secrets

# Known hosts entries mounted into the Semaphore container for SSH verification
semaphore_known_hosts: ""

# Non-internal Podman network used only for Semaphore's outbound SSH automation.
semaphore_egress_network: semaphore_egress_net

# Podman DNS aliases used on VM1 networks.
container_dns:
  domain: dns.podman
  aliases:
    postgres_backend: postgres-backend
    semaphore_backend: semaphore-backend
    semaphore_proxy: semaphore-proxy
    semaphore_egress: semaphore-egress

# Container image resolved from the approved artifact lock in vm1.yml
semaphore_image: ""
