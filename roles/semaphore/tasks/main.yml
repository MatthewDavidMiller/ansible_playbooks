---
- name: Validate Semaphore secret inputs
  ansible.builtin.assert:
    that:
      - semaphore_encryption_key | length >= 32
      - semaphore_admin_password | length > 0
      - semaphore_db_password | length > 0
    fail_msg: "Set non-empty Semaphore passwords and a semaphore_encryption_key that is at least 32 characters."
  no_log: true

- name: Inspect semaphore container network
  ansible.builtin.command:
    argv:
      - podman
      - network
      - inspect
      - semaphore_container_net
  register: semaphore_network
  changed_when: false
  failed_when: false

- name: Create semaphore container network
  ansible.builtin.command:
    argv:
      - podman
      - network
      - create
      - --internal
      - --subnet
      - "{{ route_proxy_network_subnets.semaphore_container_net }}"
      - semaphore_container_net
  when: semaphore_network.rc != 0

- name: Queue legacy semaphore proxy network for deferred replacement
  ansible.builtin.set_fact:
    container_network_migrations: "{{ container_network_migrations | default([]) + [network_migration] }}"
  vars:
    network_migration:
      name: semaphore_container_net
      subnet: "{{ route_proxy_network_subnets.semaphore_container_net }}"
  when: semaphore_network.rc == 0
    and apply_runtime_changes_on_reboot | default(false) | bool
    and (
      not ((semaphore_network.stdout | from_json | first).internal | default((semaphore_network.stdout | from_json | first).Internal | default(false)) | bool)
      or route_proxy_network_subnets.semaphore_container_net not in ((semaphore_network.stdout | from_json | first).subnets | default([]) | map(attribute='subnet') | list)
    )

- name: Remove non-internal semaphore proxy network
  ansible.builtin.command:
    argv:
      - podman
      - network
      - rm
      - --force
      - --time
      - "30"
      - semaphore_container_net
  when: semaphore_network.rc == 0
    and not (apply_runtime_changes_on_reboot | default(false) | bool)
    and (
      not ((semaphore_network.stdout | from_json | first).internal | default((semaphore_network.stdout | from_json | first).Internal | default(false)) | bool)
      or route_proxy_network_subnets.semaphore_container_net not in ((semaphore_network.stdout | from_json | first).subnets | default([]) | map(attribute='subnet') | list)
    )

- name: Recreate semaphore proxy network as internal
  ansible.builtin.command:
    argv:
      - podman
      - network
      - create
      - --internal
      - --subnet
      - "{{ route_proxy_network_subnets.semaphore_container_net }}"
      - semaphore_container_net
  when: semaphore_network.rc == 0
    and not (apply_runtime_changes_on_reboot | default(false) | bool)
    and (
      not ((semaphore_network.stdout | from_json | first).internal | default((semaphore_network.stdout | from_json | first).Internal | default(false)) | bool)
      or route_proxy_network_subnets.semaphore_container_net not in ((semaphore_network.stdout | from_json | first).subnets | default([]) | map(attribute='subnet') | list)
    )

- name: Validate Semaphore egress network
  ansible.builtin.assert:
    that:
      - semaphore_egress_network is match('^[A-Za-z0-9_.-]+$')
      - semaphore_egress_network != 'nextcloud_container_net'
      - semaphore_egress_network != 'semaphore_container_net'
    fail_msg: "semaphore_egress_network must be a safe dedicated non-backend network name."

- name: Inspect semaphore egress network
  ansible.builtin.command:
    argv:
      - podman
      - network
      - inspect
      - "{{ semaphore_egress_network }}"
  register: semaphore_egress_network_inspect
  changed_when: false
  failed_when: false

- name: Create semaphore egress network
  ansible.builtin.command:
    argv:
      - podman
      - network
      - create
      - "{{ semaphore_egress_network }}"
  when: semaphore_egress_network_inspect.rc != 0

- name: Create semaphore secret directory
  ansible.builtin.file:
    path: "{{ secret_env_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0700"

- name: Create semaphore config directory
  ansible.builtin.file:
    path: /etc/semaphore
    state: directory
    owner: "1001"
    group: root
    mode: "0750"

- name: Create semaphore state directory
  ansible.builtin.file:
    path: /var/lib/semaphore
    state: directory
    owner: "1001"
    group: root
    mode: "0750"

- name: Semaphore env file
  ansible.builtin.template:
    src: semaphore.env.j2
    dest: "{{ secret_env_dir }}/semaphore.env"
    owner: root
    group: root
    mode: "0600"
  no_log: true

- name: Semaphore known hosts file
  ansible.builtin.template:
    src: ssh_known_hosts.j2
    dest: /etc/semaphore/ssh_known_hosts
    owner: "1001"
    group: root
    mode: "0600"

- name: Semaphore service
  ansible.builtin.template:
    src: semaphore.service.j2
    dest: /etc/systemd/system/semaphore.service

- name: Enable semaphore
  ansible.builtin.systemd:
    name: semaphore.service
    enabled: true
    daemon_reload: true

- name: Semaphore script
  ansible.builtin.template:
    src: semaphore.sh.j2
    dest: /usr/local/bin/semaphore.sh
    owner: root
    group: root
    mode: "0700"

- name: Create Semaphore Nextcloud backup destination
  ansible.builtin.file:
    path: "{{ nextcloud_path }}/data/{{ nextcloud_homelab_user }}/files/{{ semaphore_backup_location | replace('Nextcloud:', '') }}"
    state: directory
    owner: "{{ nextcloud_uid }}"
    group: "{{ nextcloud_gid }}"
    mode: "0770"
  when: backup_local | default(false)

- name: Repair Semaphore Nextcloud backup destination ownership
  ansible.builtin.file:
    path: "{{ nextcloud_path }}/data/{{ nextcloud_homelab_user }}/files/{{ semaphore_backup_location | replace('Nextcloud:', '') }}"
    state: directory
    owner: "{{ nextcloud_uid }}"
    group: "{{ nextcloud_gid }}"
    recurse: true
  when: backup_local | default(false)

- name: Backup Semaphore DB Script
  ansible.builtin.template:
    src: backup_semaphore.sh.j2
    dest: /usr/local/bin/backup_semaphore.sh
    owner: root
    group: root
    mode: "0700"

- name: Backup Semaphore Daily
  ansible.builtin.cron:
    name: Backup Semaphore
    special_time: daily
    job: /usr/bin/bash /usr/local/bin/backup_semaphore.sh

- name: Start semaphore
  ansible.builtin.systemd:
    name: semaphore.service
    state: started
  when: not (apply_runtime_changes_on_reboot | default(false) | bool)

- name: Deferred container network migration script
  ansible.builtin.template:
    src: migrate_container_networks.sh.j2
    dest: /usr/local/bin/migrate_container_networks.sh
    owner: root
    group: root
    mode: "0700"
  when:
    - apply_runtime_changes_on_reboot | default(false) | bool
    - container_network_migrations | default([]) | length > 0

- name: Schedule deferred container network migration
  ansible.builtin.command:
    argv:
      - systemd-run
      - "--unit=homelab-container-network-migration-{{ ansible_date_time.epoch | default(lookup('pipe', 'date +%s')) }}"
      - --collect
      - --on-active=2min
      - /usr/bin/bash
      - /usr/local/bin/migrate_container_networks.sh
  changed_when: true
  when:
    - apply_runtime_changes_on_reboot | default(false) | bool
    - container_network_migrations | default([]) | length > 0
