---
- name: Install firewalld
  ansible.builtin.dnf:
    name: firewalld
    state: present

- name: Ensure firewalld is running
  ansible.builtin.systemd:
    name: firewalld.service
    enabled: true
    state: started

- name: Set default action for public to drop
  ansible.posix.firewalld:
    zone: public
    target: DROP
    immediate: true
    permanent: true
    state: present

- name: Create new zone and set it to drop
  ansible.posix.firewalld:
    zone: homelab
    immediate: true
    permanent: true
    state: present

- name: Set zone to drop
  ansible.posix.firewalld:
    zone: homelab
    target: DROP
    immediate: true
    permanent: true
    state: present

- name: Set management source for zone
  ansible.posix.firewalld:
    zone: homelab
    source: "{{ management_network }}"
    immediate: true
    permanent: true
    state: enabled

- name: Set ansible source for zone
  ansible.posix.firewalld:
    zone: homelab
    source: "{{ ip_ansible }}"
    immediate: true
    permanent: true
    state: enabled
  when: ip_ansible is defined

- name: Enable icmp block inversion
  ansible.posix.firewalld:
    zone: homelab
    icmp_block_inversion: true
    immediate: true
    permanent: true
    state: enabled

- name: Allow SSH
  ansible.posix.firewalld:
    zone: homelab
    service: ssh
    immediate: true
    permanent: true
    state: enabled

- name: Allow icmp
  ansible.posix.firewalld:
    zone: homelab
    icmp_block: echo-request
    immediate: true
    permanent: true
    state: enabled

- name: Disable SSH in default zone
  ansible.posix.firewalld:
    zone: public
    service: ssh
    immediate: true
    permanent: true
    state: disabled

- name: Disable SSH in default zone 2
  ansible.posix.firewalld:
    zone: public
    port: 22/tcp
    immediate: true
    permanent: true
    state: disabled

- name: Disable cockpit in default zone
  ansible.posix.firewalld:
    zone: public
    service: cockpit
    immediate: true
    permanent: true
    state: disabled

- name: Disable dhcpv6-client in default zone
  ansible.posix.firewalld:
    zone: public
    service: dhcpv6-client
    immediate: true
    permanent: true
    state: disabled

- name: Disable mdns in default zone
  ansible.posix.firewalld:
    zone: public
    service: mdns
    immediate: true
    permanent: true
    state: disabled

- name: Set interface for public zone
  ansible.posix.firewalld:
    zone: public
    interface: "{{ default_interface }}"
    immediate: true
    permanent: true
    state: enabled

- name: Reload firewalld
  ansible.builtin.command: firewall-cmd --reload
  changed_when: false
