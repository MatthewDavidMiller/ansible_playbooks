---
- name: Validate firewalld ingress inputs
  ansible.builtin.assert:
    that:
      - default_interface | length > 0
      - management_network | length > 0
      - ip_ansible is match('^([0-9]{1,3}\\.){3}[0-9]{1,3}/[0-9]{1,2}$')
      - ip_ansible != '0.0.0.0/0'
    fail_msg: "Set default_interface, management_network, and ip_ansible before applying firewall policy."

- name: Validate management_network CIDRs
  ansible.builtin.assert:
    that:
      - item is match('^([0-9]{1,3}\\.){3}[0-9]{1,3}/[0-9]{1,2}$')
      - item != '0.0.0.0/0'
    fail_msg: "Each management_network entry must be a valid CIDR and not 0.0.0.0/0."
  loop: "{{ management_network }}"

- name: Install firewalld
  ansible.builtin.dnf:
    name: firewalld
    state: present

- name: Enable firewalld
  ansible.builtin.systemd:
    name: firewalld.service
    enabled: true

- name: Start firewalld
  ansible.builtin.systemd:
    name: firewalld.service
    state: started
  when: not (apply_runtime_changes_on_reboot | default(false) | bool)

- name: Set default action for public to drop
  ansible.posix.firewalld:
    zone: public
    target: DROP
    permanent: true
    immediate: "{{ not (apply_runtime_changes_on_reboot | default(false) | bool) }}"
    state: present

- name: Create new zone and set it to drop
  ansible.posix.firewalld:
    zone: homelab
    permanent: true
    immediate: "{{ not (apply_runtime_changes_on_reboot | default(false) | bool) }}"
    state: present

- name: Set zone to drop
  ansible.posix.firewalld:
    zone: homelab
    target: DROP
    permanent: true
    immediate: "{{ not (apply_runtime_changes_on_reboot | default(false) | bool) }}"
    state: present

- name: Set management source for zone
  ansible.posix.firewalld:
    zone: homelab
    source: "{{ mgmt_net }}"
    permanent: true
    immediate: "{{ not (apply_runtime_changes_on_reboot | default(false) | bool) }}"
    state: enabled
  loop: "{{ management_network }}"
  loop_control:
    loop_var: mgmt_net

- name: Set ansible source for zone
  ansible.posix.firewalld:
    zone: homelab
    source: "{{ ip_ansible }}"
    permanent: true
    immediate: "{{ not (apply_runtime_changes_on_reboot | default(false) | bool) }}"
    state: enabled

- name: Enable icmp block inversion
  ansible.posix.firewalld:
    zone: homelab
    icmp_block_inversion: true
    permanent: true
    immediate: "{{ not (apply_runtime_changes_on_reboot | default(false) | bool) }}"
    state: enabled

- name: Allow SSH
  ansible.posix.firewalld:
    zone: homelab
    service: ssh
    permanent: true
    immediate: "{{ not (apply_runtime_changes_on_reboot | default(false) | bool) }}"
    state: enabled

- name: Allow icmp
  ansible.posix.firewalld:
    zone: homelab
    icmp_block: echo-request
    permanent: true
    immediate: "{{ not (apply_runtime_changes_on_reboot | default(false) | bool) }}"
    state: enabled

- name: Disable SSH in default zone
  ansible.posix.firewalld:
    zone: public
    service: ssh
    permanent: true
    immediate: "{{ not (apply_runtime_changes_on_reboot | default(false) | bool) }}"
    state: disabled

- name: Disable SSH in default zone 2
  ansible.posix.firewalld:
    zone: public
    port: 22/tcp
    permanent: true
    immediate: "{{ not (apply_runtime_changes_on_reboot | default(false) | bool) }}"
    state: disabled

- name: Disable cockpit in default zone
  ansible.posix.firewalld:
    zone: public
    service: cockpit
    permanent: true
    immediate: "{{ not (apply_runtime_changes_on_reboot | default(false) | bool) }}"
    state: disabled

- name: Disable dhcpv6-client in default zone
  ansible.posix.firewalld:
    zone: public
    service: dhcpv6-client
    permanent: true
    immediate: "{{ not (apply_runtime_changes_on_reboot | default(false) | bool) }}"
    state: disabled

- name: Disable mdns in default zone
  ansible.posix.firewalld:
    zone: public
    service: mdns
    permanent: true
    immediate: "{{ not (apply_runtime_changes_on_reboot | default(false) | bool) }}"
    state: disabled

- name: Set interface for public zone
  ansible.posix.firewalld:
    zone: public
    interface: "{{ default_interface }}"
    permanent: true
    immediate: "{{ not (apply_runtime_changes_on_reboot | default(false) | bool) }}"
    state: enabled

- name: Reload firewalld
  ansible.builtin.command: firewall-cmd --reload
  changed_when: false
  when: not (apply_runtime_changes_on_reboot | default(false) | bool)
