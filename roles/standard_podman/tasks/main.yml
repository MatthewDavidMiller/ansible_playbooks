---
- name: Install podman and image tooling
  ansible.builtin.dnf:
    name:
      - podman
      - skopeo
    state: present

- name: Create podman secret directory
  ansible.builtin.file:
    path: "{{ secret_env_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0700"

- name: Validate approved image policy inputs
  ansible.builtin.assert:
    that:
      - approved_container_images | length > 0
    fail_msg: Define approved_container_images with approved immutable digest references.

- name: Enforce approved digest references
  ansible.builtin.assert:
    that:
      - item is match("^\\S+@sha256:[0-9a-f]{64}$")
    fail_msg: "Unapproved image reference '{{ item }}'. Use an immutable digest reference of the form <registry>/<repo>@sha256:<digest>."
  loop: "{{ approved_container_images | unique }}"

- name: Check for approved images in the local podman store
  ansible.builtin.command:
    argv:
      - podman
      - image
      - exists
      - "{{ item }}"
  loop: "{{ approved_container_images | unique }}"
  register: approved_container_image_presence
  changed_when: false
  failed_when: false

- name: Pull approved images into the local podman store
  ansible.builtin.command:
    argv:
      - podman
      - pull
      - "{{ item.item }}"
  loop: "{{ approved_container_image_presence.results }}"
  loop_control:
    label: "{{ item.item }}"
  when: item.rc != 0
