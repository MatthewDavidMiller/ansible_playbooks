---
- name: Install podman
  ansible.builtin.dnf:
    name: podman
    state: present

- name: Create podman secret directory
  ansible.builtin.file:
    path: "{{ secret_env_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0700"

- name: Docker login secret env file
  ansible.builtin.template:
    src: docker_login.env.j2
    dest: "{{ secret_env_dir }}/docker_login.env"
    owner: root
    group: root
    mode: "0600"

- name: Login to Docker Service
  ansible.builtin.template:
    src: login_to_docker.j2
    dest: /etc/systemd/system/login_to_docker.service

- name: Enable Login to Docker Service
  ansible.builtin.systemd:
    name: login_to_docker.service
    enabled: true
    daemon_reload: true

- name: Start Login to Docker Service
  ansible.builtin.systemd:
    name: login_to_docker.service
    state: started
  when: not (apply_runtime_changes_on_reboot | default(false) | bool)
