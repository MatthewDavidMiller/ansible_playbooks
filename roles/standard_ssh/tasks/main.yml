---
- name: Ensure sshd drop-in directory exists
  ansible.builtin.file:
    path: /etc/ssh/sshd_config.d
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Deploy standard ssh hardening drop-in
  ansible.builtin.template:
    src: 10-standard-hardening.conf.j2
    dest: /etc/ssh/sshd_config.d/10-standard-hardening.conf
    owner: root
    group: root
    mode: "0644"
  notify: Reload sshd

- name: Validate sshd configuration
  ansible.builtin.command: /usr/sbin/sshd -t
  changed_when: false
