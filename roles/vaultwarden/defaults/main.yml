---
# vaultwarden role defaults

# Path to the Vaultwarden container data directory
vaultwarden_path: ""

# Rclone remote path for Vaultwarden database backup uploads (e.g. "Nextcloud:vaultwarden_backup")
vaultwarden_backup_location: ""

# When true, backups are written directly to the local Nextcloud data directory
# instead of being uploaded via rclone.
backup_local: false

# Path to Nextcloud data root (required when backup_local is true)
nextcloud_path: ""

# Nextcloud username whose files directory is used as the backup destination
nextcloud_homelab_user: ""

# UID/GID used by Nextcloud to own files on the host-mounted data path
nextcloud_uid: "33"
nextcloud_gid: "33"

# Disable public self-signup by default
vaultwarden_signups_allowed: false

# Container image resolved from the approved artifact lock in vm1.yml
vaultwarden_image: ""

# Podman DNS aliases used on VM1 networks.
container_dns:
  domain: dns.podman
  aliases:
    vaultwarden_proxy: vaultwarden-proxy

# Deterministic VM1 route proxy network subnet.
route_proxy_network_subnets:
  vaultwarden_container_net: 172.16.1.16/29

# Static container IP used with Traefik /etc/hosts overrides.
container_static_ips:
  vaultwarden_proxy: 172.16.1.18
