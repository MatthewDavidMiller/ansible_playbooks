---
- name: Validate Vaultwarden public signup policy
  ansible.builtin.assert:
    that:
      - not (vaultwarden_signups_allowed | bool)
    fail_msg: "vaultwarden_signups_allowed must remain false for the hardened VM1 deployment."

- name: Install sqlite3
  ansible.builtin.dnf:
    name: sqlite
    state: present

- name: Inspect vaultwarden container network
  ansible.builtin.command:
    argv:
      - podman
      - network
      - inspect
      - vaultwarden_container_net
  register: vaultwarden_network
  changed_when: false
  failed_when: false

- name: Create vaultwarden container network
  ansible.builtin.command:
    argv:
      - podman
      - network
      - create
      - --internal
      - --subnet
      - 172.16.1.16/29
      - vaultwarden_container_net
  when: vaultwarden_network.rc != 0

- name: Queue legacy vaultwarden proxy network for deferred replacement
  ansible.builtin.set_fact:
    container_network_migrations: "{{ container_network_migrations | default([]) + [network_migration] }}"
  vars:
    network_migration:
      name: vaultwarden_container_net
      subnet: 172.16.1.16/29
  when: vaultwarden_network.rc == 0
    and apply_runtime_changes_on_reboot | default(false) | bool
    and not ((vaultwarden_network.stdout | from_json | first).internal | default((vaultwarden_network.stdout | from_json | first).Internal | default(false)) | bool)

- name: Remove non-internal vaultwarden proxy network
  ansible.builtin.command:
    argv:
      - podman
      - network
      - rm
      - --force
      - --time
      - "30"
      - vaultwarden_container_net
  when: vaultwarden_network.rc == 0
    and not (apply_runtime_changes_on_reboot | default(false) | bool)
    and not ((vaultwarden_network.stdout | from_json | first).internal | default((vaultwarden_network.stdout | from_json | first).Internal | default(false)) | bool)

- name: Recreate vaultwarden proxy network as internal
  ansible.builtin.command:
    argv:
      - podman
      - network
      - create
      - --internal
      - --subnet
      - 172.16.1.16/29
      - vaultwarden_container_net
  when: vaultwarden_network.rc == 0
    and not (apply_runtime_changes_on_reboot | default(false) | bool)
    and not ((vaultwarden_network.stdout | from_json | first).internal | default((vaultwarden_network.stdout | from_json | first).Internal | default(false)) | bool)

- name: Create Vaultwarden container path
  ansible.builtin.file:
    path: "{{ vaultwarden_path }}"
    state: directory
    owner: root
    group: root
    mode: "0750"

- name: Create Vaultwarden container data path
  ansible.builtin.file:
    path: "{{ vaultwarden_path }}/vw-data"
    state: directory
    owner: root
    group: root
    mode: "0700"

- name: Create Vaultwarden container ssl certs path
  ansible.builtin.file:
    path: "{{ vaultwarden_path }}/ssl_certs"
    state: directory
    owner: root
    group: root
    mode: "0700"

- name: Create Vaultwarden backups path
  ansible.builtin.file:
    path: "{{ vaultwarden_path }}/database_backups"
    state: directory
    owner: root
    group: root
    mode: "0700"

- name: Create Vaultwarden Nextcloud backup destination
  ansible.builtin.file:
    path: "{{ nextcloud_path }}/data/{{ nextcloud_homelab_user }}/files/{{ vaultwarden_backup_location | replace('Nextcloud:', '') }}"
    state: directory
    owner: "{{ nextcloud_uid }}"
    group: "{{ nextcloud_gid }}"
    mode: "0770"
  when: backup_local | default(false)

- name: Repair Vaultwarden Nextcloud backup destination ownership
  ansible.builtin.file:
    path: "{{ nextcloud_path }}/data/{{ nextcloud_homelab_user }}/files/{{ vaultwarden_backup_location | replace('Nextcloud:', '') }}"
    state: directory
    owner: "{{ nextcloud_uid }}"
    group: "{{ nextcloud_gid }}"
    mode: "0770"
    recurse: true
  when: backup_local | default(false)

- name: Vaultwarden Service
  ansible.builtin.template:
    src: vaultwarden.service.j2
    dest: /etc/systemd/system/vaultwarden.service

- name: Enable Vaultwarden
  ansible.builtin.systemd:
    name: vaultwarden.service
    enabled: true
    daemon_reload: true

- name: Backup Database Script
  ansible.builtin.template:
    src: backup_db.j2
    dest: /usr/local/bin/backup_vaultwarden_db.sh
    owner: root
    group: root
    mode: "0700"

- name: Backup Vaultwarden Daily
  ansible.builtin.cron:
    name: Backup Vaultwarden
    special_time: daily
    job: /usr/bin/bash /usr/local/bin/backup_vaultwarden_db.sh

- name: Vaultwarden script
  ansible.builtin.template:
    src: vaultwarden.sh.j2
    dest: /usr/local/bin/vaultwarden.sh
    owner: root
    group: root
    mode: "0700"

- name: Start Vaultwarden
  ansible.builtin.systemd:
    name: vaultwarden.service
    state: started
  when: not (apply_runtime_changes_on_reboot | default(false) | bool)
