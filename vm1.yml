---
- name: Configure vm1
  hosts: vm1
  vars_files:
    - artifacts/containers.lock.yml
  vars:
    nextcloud_uid: "33"
    nextcloud_gid: "33"
    apply_runtime_changes_on_reboot: true
    traefik_image: "{{ artifact_locked_images.traefik.upstream_ref | regex_replace(':[^:@/]+$', '') }}@{{ artifact_locked_images.traefik.approved_digest }}"
    postgres_image: "{{ artifact_locked_images.postgres.upstream_ref | regex_replace(':[^:@/]+$', '') }}@{{ artifact_locked_images.postgres.approved_digest }}"
    redis_image: "{{ artifact_locked_images.redis.upstream_ref | regex_replace(':[^:@/]+$', '') }}@{{ artifact_locked_images.redis.approved_digest }}"
    nextcloud_image: "{{ artifact_locked_images.nextcloud.upstream_ref | regex_replace(':[^:@/]+$', '') }}@{{ artifact_locked_images.nextcloud.approved_digest }}"
    paperless_image: "{{ artifact_locked_images.paperless.upstream_ref | regex_replace(':[^:@/]+$', '') }}@{{ artifact_locked_images.paperless.approved_digest }}"
    navidrome_image: "{{ artifact_locked_images.navidrome.upstream_ref | regex_replace(':[^:@/]+$', '') }}@{{ artifact_locked_images.navidrome.approved_digest }}"
    vaultwarden_image: "{{ artifact_locked_images.vaultwarden.upstream_ref | regex_replace(':[^:@/]+$', '') }}@{{ artifact_locked_images.vaultwarden.approved_digest }}"
    semaphore_image: "{{ artifact_locked_images.semaphore.upstream_ref | regex_replace(':[^:@/]+$', '') }}@{{ artifact_locked_images.semaphore.approved_digest }}"
    approved_container_images:
      - "{{ traefik_image }}"
      - "{{ postgres_image }}"
      - "{{ redis_image }}"
      - "{{ nextcloud_image }}"
      - "{{ paperless_image }}"
      - "{{ navidrome_image }}"
      - "{{ vaultwarden_image }}"
      - "{{ semaphore_image }}"
  module_defaults:
    ansible.posix.firewalld:
      offline: "{{ apply_runtime_changes_on_reboot | bool }}"
  roles:
    - standard_ssh
    - standard_qemu_guest_agent
    - standard_update_packages
    - configure_timezone
    - standard_cron
    - dynamic_dns
    - standard_firewalld
    - standard_podman
    - standard_rclone
    - standard_selinux
    - backup
    - ansible
    - reverse_proxy
    - nextcloud
    - paperless_ngx
    - navidrome
    - vaultwarden
    - semaphore
    - standard_cleanup
